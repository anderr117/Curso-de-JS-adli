<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio DOM eventos y funciones</title>

    <style>
        .box{
            width: 200px;
            height: 250px;
            float: left;
            margin: 20px;
        }

        .dashed{
            border: 3px dashed black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <!--
    1- formulario, campos: nombre, apellidos y edad
    2- boton enviar el formulario: eventos submit
    3- mostrar datos por pantalla
    4- tener un boton que al darle clic nos muestre los datos actuales del formulario
    -->

    <h1>Ejercicio DOM eventos y funciones</h1>

    <div class="box">

        <form action="#" method="post" id="formulario" onsubmit="return false">
            <label for="nombre">Nombre</label> <br>
            <input type="text" name="nombre" id="nombre"> <br>
            <!--Para validar-->
            <span id="error_nombre"></span> <br>
            <!-------------------->

            <label for="apellidos">Apellidos</label><br>
            <input type="text" name="apellidos" id="apellidos"> <br>

            <label for="edad">Edad</label> <br>
            <input type="number" name="edad" id="edad"> <br>

            <input type="submit" value="enviar" id="submit">

        </form>

    </div>


    <div class="box dashed">
        <h3>Información del usuario</h3>
        <hr>

        <p id="p_nombre">
            Nombre: <span></span>
        </p>

        <p id="p_apellidos">
            Apellidos: <span></span>
        </p>

        <p id="p_edad">
            Edad: <span></span>
        </p>
    </div>
    
    <script src="./js/29-ejercicio-dom.js"></script>
</body>
</html>
